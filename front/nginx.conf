server {
    listen 80; 
    server_name yang-sjq.cn; 
    index index.php index.html index.htm default.php default.htm default.html; 
    access_log /www/sites/yang-sjq.cn/log/access.log main; 
    error_log /www/sites/yang-sjq.cn/log/error.log; 
    
    # 保护敏感文件
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404; 
    }
    
    # Let's Encrypt 验证
    location ^~ /.well-known/acme-challenge {
        allow all; 
        root /usr/share/nginx/html; 
    }
    
    # 阻止访问危险文件类型
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403; 
    }
    
    # API 请求代理到后端服务
    location /api {
        proxy_pass http://localhost:8000;  # 请根据实际后端服务地址修改
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 设置超时时间
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 前端应用根目录
    root /www/sites/yang-sjq.cn/index; 
    
    # 使 Vue Router 在 History 模式下正常工作
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    error_page 404 /404.html; 
}